<section id="faq">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="text-center mb-5">
          <span class="section-label">FAQ</span>
          <h2 class="section-title">Common Questions</h2>
          <div class="blue-line mx-auto"></div>
        </div>
        <div class="accordion faq-accordion" id="faqAccordion">
          <div class="faq-item fade-up" *ngFor="let q of faqs; let i = index" [class]="'delay-' + (i+1)">
            <button class="faq-question collapsed" [attr.data-bs-toggle]="'collapse'" [attr.data-bs-target]="'#faq' + i">
              {{ q.question }}
              <i class="bi bi-plus-lg faq-icon"></i>
            </button>
            <div [id]="'faq' + i" class="collapse" data-bs-parent="#faqAccordion">
              <div class="faq-answer">{{ q.answer }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
