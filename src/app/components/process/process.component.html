<section id="process">
  <div class="container">
    <div class="text-center mb-5">
      <span class="section-label">How It Works</span>
      <h2 class="section-title">Our 5-Step<br>Process</h2>
      <div class="blue-line mx-auto"></div>
      <p class="text-steel mx-auto" style="max-width:520px">
        A proven approach that delivers consistent results for the most demanding venues in professional sports.
      </p>
    </div>
    <div class="process-track">
      <div class="process-line"></div>
      <div class="row g-4 justify-content-center">
        <div class="col-md-6 col-lg-4 fade-up" *ngFor="let step of steps; let i = index" [class]="'delay-' + (i+1)">
          <div class="process-card">
            <div class="step-num">{{ step.num }}</div>
            <div class="step-icon"><i [class]="'bi bi-' + step.icon"></i></div>
            <h4 class="step-title">{{ step.title }}</h4>
            <p class="text-steel">{{ step.desc }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
