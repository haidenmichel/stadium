<section id="testimonials">
  <div class="container">
    <div class="text-center mb-5">
      <span class="section-label">Client Testimonials</span>
      <h2 class="section-title">Trusted By The<br>Pros Who Know</h2>
      <div class="blue-line mx-auto"></div>
    </div>
    <div class="row g-4">
      <div class="col-md-6 col-lg-4 fade-up" *ngFor="let t of testimonials; let i = index" [class]="'delay-' + (i+1)">
        <div class="testi-card h-100">
          <div class="stars mb-3">
            <i class="bi bi-star-fill text-yellow" *ngFor="let s of [1,2,3,4,5]"></i>
          </div>
          <p class="testi-quote">"{{ t.quote }}"</p>
          <div class="testi-author mt-4">
            <div class="author-avatar">{{ t.initials }}</div>
            <div>
              <div class="author-name">{{ t.name }}</div>
              <div class="author-role text-steel">{{ t.role }}</div>
              <div class="author-venue text-blue">{{ t.venue }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="trust-logos mt-5 text-center fade-up">
      <p class="section-label mb-3">Trusted by organizations including</p>
      <div class="d-flex flex-wrap justify-content-center align-items-center gap-4">
        <span class="trust-item" *ngFor="let l of logos">{{ l }}</span>
      </div>
    </div>
  </div>
</section>
